# TOML 配置格式标识；必须为非零整数，程序才会按 TOML 解析本文件。
# TOML format marker; it must be a non-zero integer for this file to be parsed as TOML.
version = 1
[common]
# API 模式固定开启，令牌认证已移除；调用转换接口时仍需通过 url 参数提供订阅来源。
# API mode is always enabled and token authentication has been removed; conversion requests must still provide subscription sources through the url argument.
# 未提供 url 参数时使用的默认订阅来源数组；每项可为本地文件或 URL，空数组表示不设默认来源。
# Default subscription sources used when url is omitted; each item may be a local file or URL, and an empty array disables the fallback.
default_url = []

# 是否把 insert_url 中的节点插入每次转换；关闭后 insert_url 不参与输出。
# Whether to inject nodes from insert_url into every conversion; when false, insert_url is ignored.
enable_insert = true
# 要插入的订阅来源数组；每项支持本地文件或 URL。示例中的空字符串等同于无有效插入来源，建议不用时改为空数组。
# Subscription sources to inject; each item supports a local file or URL. The sample empty string supplies no useful source; prefer an empty array when unused.
insert_url = [""]
# true 将插入来源置于请求来源之前，并让其节点优先匹配无特定分组限制的规则；false 则追加在后。
# true places inserted sources before request sources and gives their nodes priority for non-group-specific rules; false appends them.
prepend_insert_url = true

# 按节点名称排除的正则表达式数组；多个表达式任一匹配即排除。取消下一行注释即可启用示例。
# Regular expressions used to exclude node remarks; a match by any expression excludes the node. Uncomment the next line to enable the example.
#exclude_remarks = ["(到期|剩余流量|时间|官网|产品)"]

# 按节点名称保留的正则表达式数组；配置后仅保留至少匹配一个表达式的节点；省略该键表示不过滤。
# Regular expressions used to include node remarks; when configured, only nodes matching at least one expression are kept. Omitting the key disables this filter.
#include_remarks = ["V3.*港"]

# 是否启用 JavaScript 节点过滤器；关闭时 filter_script 不会读取或执行。
# Whether to enable JavaScript node filtering; filter_script is neither loaded nor executed when disabled.
enable_filter = false
# 过滤脚本可为多行内联 JavaScript 或 path:/path/to/script.js；须定义 filter(node) 并返回真值以保留节点。
# The filter may be multiline inline JavaScript or path:/path/to/script.js; define filter(node) and return a truthy value to keep the node.
#filter_script = '''
#function filter(node) {
#    const info = JSON.parse(node.ProxyInfo);
#    if(info.EncryptMethod.includes('chacha20'))
#	    return true;
#    return false;
#}
#'''

# 请求未指定 config 时加载的默认外部配置；支持本地文件或 URL，空值会回退到程序内置的 Custom_OpenClash_Rules 地址。
# Default external configuration loaded when the request omits config; supports a local file or URL. An empty value falls back to the built-in Custom_OpenClash_Rules URL.
default_external_config = "https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@refs/heads/main/cfg/Custom_Clash.ini"

# 外部配置中 rule_base 可访问的本地文件根目录，也是公开安全档位下的受信任资源根之一。
# Local root allowed for rule_base paths in external configs; it is also a trusted-resource root under public security profiles.
base_path = "base"

# 各目标格式的基础模板；均支持 base_path 范围内的本地文件或 URL，生成器会在其上写入节点、策略组和规则。
# Base templates for each target format; each accepts a local file under base_path or a URL, and the generator writes nodes, groups, and rules into it.
# Clash 基础模板。/ Clash base template.
clash_rule_base = "base/all_base.tpl"

# Surge 基础模板。/ Surge base template.
surge_rule_base = "base/all_base.tpl"

# Surfboard 基础模板。/ Surfboard base template.
surfboard_rule_base = "base/all_base.tpl"

# Mellow 基础模板。/ Mellow base template.
mellow_rule_base = "base/all_base.tpl"

# Quantumult 基础模板。/ Quantumult base template.
quan_rule_base = "base/all_base.tpl"

# Quantumult X 基础模板。/ Quantumult X base template.
quanx_rule_base = "base/all_base.tpl"

# Loon 基础模板。/ Loon base template.
loon_rule_base = "base/all_base.tpl"

# Shadowsocks Android 基础模板。/ Shadowsocks Android base template.
sssub_rule_base = "base/all_base.tpl"

# sing-box 基础模板。/ sing-box base template.
singbox_rule_base = "base/all_base.tpl"

# 分别控制下载外部配置、规则集和订阅时使用的代理。NONE（不区分大小写）和空值强制直连并忽略环境代理；SYSTEM 按系统代理来源解析；显式 URI 支持 http/https/socks4/socks4a/socks5/socks5h，且不会被 NO_PROXY 绕过。
# Proxies used when downloading external configs, rulesets, and subscriptions. NONE (case-insensitive) and an empty value force direct connections and ignore proxy environment variables. SYSTEM resolves the documented system source. Explicit http/https/socks4/socks4a/socks5/socks5h URIs are never bypassed by NO_PROXY.
# socks5 在本地解析域名，socks5h 将域名交给 SOCKS 服务端解析。cors:https://relay.example/ 是兼容的 HTTP CORS 中继，不是底层网络代理。
# socks5 resolves names locally; socks5h lets the SOCKS server resolve them. cors:https://relay.example/ is a compatible HTTP CORS relay, not a network proxy.
proxy_config = "SYSTEM"
proxy_ruleset = "SYSTEM"
proxy_subscription = "NONE"

# 是否在节点名称后附加协议类型标签，例如 [SS]、[SSR]、[VMess]。
# Whether to append a protocol tag such as [SS], [SSR], or [VMess] to each node remark.
append_proxy_type = false

# 是否在每次 /sub 请求前重新读取本文件；便于热更新，但会增加请求开销并使配置代次变化。
# Whether to reload this file before every /sub request; useful for live edits, but adds request overhead and advances the configuration generation.
reload_conf_on_request = false

[custom_openclash_rules]
# 是否为 Aethersailor/Custom_OpenClash_Rules 主分支启用随包资源回退和 URL 重写。正常在线运行应保持 false，仅在上游或 CDN 不可用时开启。
# Whether to enable bundled-resource fallback and URL rewriting for the Aethersailor/Custom_OpenClash_Rules main branch. Keep false normally; enable only when upstream or its CDN mirrors are unavailable.
fallback_enabled = false
# 是否通过 /Custom_OpenClash_Rules/main/ 对外发布镜像内置的规则文件。默认关闭，仅在明确需要由本服务托管这些公开文件时开启。
# Whether to publish the bundled rule files under /Custom_OpenClash_Rules/main/. Disabled by default; enable only when this service should explicitly host those public files.
publish_enabled = false

[[userinfo.stream_rule]]
# 从节点名称提取流量信息的有序规则；match 为完整正则，replace 使用 total/left/used=$n 的查询串格式。
# Ordered rule for extracting traffic data from node remarks; match is a full regex and replace uses the total/left/used=$n query-string form.
match = '^剩余流量：(.*?)\|总流量：(.*)$'
replace = 'total=$2&left=$1'

[[userinfo.stream_rule]]
match = '^剩余流量：(.*?) (.*)$'
replace = 'total=$1&left=$2'

[[userinfo.stream_rule]]
match = '^Bandwidth: (.*?)/(.*)$'
replace = 'used=$1&total=$2'

[[userinfo.stream_rule]]
match = '^.*剩余(.*?)(?:\s*?)@(?:.*)$'
replace = 'total=$1'

[[userinfo.time_rule]]
# 从节点名称提取到期信息的有序规则；match 为完整正则，绝对时间 replace 格式为 yyyy:mm:dd:hh:mm:ss。
# Ordered rule for extracting expiration data from node remarks; match is a full regex and absolute replace values use yyyy:mm:dd:hh:mm:ss.
match = '^过期时间：(\d+)-(\d+)-(\d+) (\d+):(\d+):(\d+)$'
replace = '$1:$2:$3:$4:$5:$6'

[[userinfo.time_rule]]
match = '^到期时间:(\d+)-(\d+)-(\d+)$'
replace = '$1:$2:$3:0:0:0'

[[userinfo.time_rule]]
match = '^Smart Access expire: (\d+)/(\d+)/(\d+)$'
replace = '$1:$2:$3:0:0:0'

[node_pref]
# 可选的三态覆盖：取消注释后强制所有输出节点启用或禁用 UDP、TCP Fast Open、跳过证书校验或 TLS 1.3；保持注释则沿用节点原值。
# Optional tri-state overrides: uncomment to force UDP, TCP Fast Open, certificate verification skipping, or TLS 1.3 on/off for all output nodes; leave omitted to preserve each node's value.
#udp_flag = false
#tcp_fast_open_flag = false
#skip_cert_verify_flag = false
#tls13_flag = false

# 是否按名称排序节点；启用后使用 sort_script（如已配置），否则使用内置排序行为。
# Whether to sort nodes by remark; when enabled, sort_script is used if configured, otherwise the built-in ordering applies.
sort_flag = false
# 排序脚本可为多行内联 JavaScript 或 path:/path/to/script.js；定义 compare(node_a, node_b) 作为节点比较器。
# The sorter may be multiline inline JavaScript or path:/path/to/script.js; define compare(node_a, node_b) as the node comparator.
#sort_script = '''
#function compare(node_a, node_b) {
#   return info_a.Remark > info_b.Remark;
#}
#'''

# 是否过滤已弃用或不再推荐的节点类型/配置。
# Whether to remove deprecated or no-longer-recommended node types/configurations.
filter_deprecated_nodes = false
# 是否把上游 Subscription-UserInfo 流量/到期信息附加到生成响应头。
# Whether to append upstream Subscription-UserInfo traffic and expiration metadata to generated response headers.
append_sub_userinfo = true
# Clash 输出是否使用新字段名（如 proxy-groups、rules）；关闭时兼容旧字段名。
# Whether Clash output uses modern field names such as proxy-groups and rules; false retains legacy names.
clash_use_new_field_name = true

# Clash 节点列表的 YAML 样式：block（多行块）、flow（每节点行内映射）或 compact（整个列表紧凑行内）。
# YAML style for the Clash proxies list: block (multiline), flow (one inline map per node), or compact (the whole list inline).
clash_proxies_style = "flow"
# 当前版本保留的兼容字段；偏好设置读取器尚未应用它，策略组样式仍使用程序内置值。
# Compatibility placeholder in the current version; the preference loader does not yet apply it, so proxy-group style remains the built-in value.
clash_proxy_groups_style = "flow"

# 是否为 sing-box 规则加入 Clash 模式，并在 outbounds 末尾添加 GLOBAL 出站组。
# Whether to add Clash modes to sing-box rules and append a GLOBAL outbound group.
singbox_add_clash_modes = true

# 节点重命名规则按数组顺序执行；match/replace 为正则替换，也可改用 script 或 import 表项。
# Node-renaming rules run in array order; match/replace performs regex replacement, and script or import entries may be used instead.
[[node_pref.rename_node]]
match = '\(?((x|X)?(\d+)(\.?\d+)?)((\s?倍率?)|(x|X))\)?'
replace = "$1x"

[managed_config]
# 是否在 Surge 输出中写入 #!MANAGED-CONFIG 元信息。
# Whether to write #!MANAGED-CONFIG metadata into Surge output.
write_managed_config = true

# MANAGED-CONFIG 与 /getruleset、/qx-rewrite、/qx-script 生成地址的服务前缀，不含末尾斜杠。
# Service prefix used by MANAGED-CONFIG and generated /getruleset, /qx-rewrite, and /qx-script URLs, without a trailing slash.
managed_config_prefix = "http://127.0.0.1:25500"

# 托管配置建议更新间隔，单位秒。
# Suggested managed-config refresh interval in seconds.
config_update_interval = 86400

# true 时 Surge 在超过更新间隔后要求强制更新；false 仅按普通托管配置更新。
# When true, Surge requires a forced update after the interval; false uses normal managed-config refresh behavior.
config_update_strict = false

# 写入部分 Quantumult X 重写脚本的设备 ID；不需要时留空。
# Device ID embedded in rewrite scripts for certain Quantumult X versions; leave empty when not needed.
quanx_device_id = ""

[surge_external_proxy]
# Surge 输出使用 SSR 外部代理时的 ssr-local 可执行文件路径；取消注释后生效。
# Path to the ssr-local executable for Surge SSR external proxies; uncomment to enable it.
#surge_ssr_path = "/usr/bin/ssr-local"
# 是否在生成 Surge 外部代理配置时解析服务器主机名。
# Whether to resolve server hostnames while generating Surge external-proxy configuration.
resolve_hostname = true

[security]
# 安全档位：lan 保留局域网兼容行为并允许本地/私网/fake-ip 资源；public 限制公开请求控制的不受信任抓取；strict 另行强制禁止公开上传。
# Security profile: lan preserves LAN-compatible access to local/private/fake-IP resources; public restricts untrusted request-controlled fetches; strict also forbids public upload.
# 环境变量 SUBCONVERTER_SECURITY_PROFILE=lan|public|strict 优先于文件；无效值会回退到 lan。
# SUBCONVERTER_SECURITY_PROFILE=lan|public|strict overrides the file; invalid values fall back to lan.
profile = "lan"
# 仅决定 public 档位是否允许公开上传；lan 始终保留旧上传行为，strict 始终禁止。环境变量 SUBCONVERTER_ALLOW_PUBLIC_UPLOAD 优先。
# Controls public upload only for the public profile; lan always keeps legacy upload behavior and strict always blocks it. SUBCONVERTER_ALLOW_PUBLIC_UPLOAD overrides this value.
allow_public_upload = false

[statistics]
# 是否启用隐私友好的运行统计以及 /dashboard、/dashboard/data；关闭时不启用统计请求处理。
# Whether to enable privacy-preserving runtime statistics plus /dashboard and /dashboard/data; false keeps statistics request handling disabled.
enabled = false
# 统计持久化目录；容器部署如需重启后保留数据，应把此目录挂载到持久卷。
# Statistics persistence directory; mount it on a persistent volume in containers if data must survive restarts.
data_dir = "stats"
# 两次持久化写入之间的最短秒数；越小数据越及时，但磁盘写入更频繁。
# Minimum seconds between persistence writes; lower values improve freshness but increase disk writes.
flush_interval = 5

[statistics.geo]
# 地理来源：header 从受信任边缘注入的国家请求头统计且不保存 IP；none 将所有访问记为未知。
# Geography source: header reads country headers injected by a trusted edge without storing IPs; none records all visits as unknown.
provider = "header"
# 按顺序查找国家代码的请求头名称；只应信任由反向代理/CDN 清洗并覆盖的请求头。
# Request-header names checked in order for country codes; trust only headers sanitized and overwritten by your reverse proxy/CDN.
country_headers = ["CF-IPCountry", "X-Geo-Country", "X-Vercel-IP-Country", "CloudFront-Viewer-Country"]

[statistics.dashboard_auth]
# 是否为 /dashboard 与 /dashboard/data 启用 HTTP Basic 认证；仅在 statistics.enabled=true 时有意义。
# Whether to enable HTTP Basic authentication for /dashboard and /dashboard/data; relevant only when statistics.enabled=true.
enabled = false
# Basic 认证用户名；启用认证时应设置非空值。
# Basic-auth username; set a non-empty value when authentication is enabled.
username = ""
# Basic 认证密码；请使用强密码并避免提交真实凭据。
# Basic-auth password; use a strong value and do not commit real credentials.
password = ""
# window_seconds 窗口内允许的失败次数下限；达到后锁定 lock_seconds。三个数值小于 1 时都会被收敛为 1。
# Failed attempts allowed within window_seconds before a lock of lock_seconds; all three values are clamped to at least 1.
max_failures = 5
window_seconds = 300
lock_seconds = 900

[emojis]
# 是否按 emoji 数组规则为节点名称添加 Emoji。
# Whether to add emoji to node remarks according to the emoji array.
add_emoji = false
# 添加新 Emoji 前是否移除节点名称中已有的 Emoji，避免重复标记。
# Whether to remove existing emoji from node remarks before applying new ones, avoiding duplicate markers.
remove_old_emoji = true

# Emoji 规则按数组顺序处理：match/emoji 为正则映射，也可使用 script 或 import 表项。
# Emoji rules run in array order: match/emoji defines a regex mapping, while script or import entries are also supported.
[[emojis.emoji]]
#match = '(流量|时间|应急)'
#emoji = '🏳️‍🌈'
import = "snippets/emoji.toml"

# 自定义策略组数组。type 支持 select、url-test、fallback、load-balance、relay、ssid、smart；rule 用正则或 [] 字面成员选节点，use 引用 provider。
# Custom proxy-group array. type accepts select, url-test, fallback, load-balance, relay, ssid, or smart; rule selects nodes by regex/[] literals, and use references providers.
# 测试类组使用 url/interval/timeout/tolerance；可选项包括 lazy、evaluate-before-use、load-balance 的 strategy/persistent，以及通用 disable-udp；import 可导入外部数组。
# Test groups use url/interval/timeout/tolerance; optional fields include lazy, evaluate-before-use, load-balance strategy/persistent, and common disable-udp; import loads an external array.
# [[custom_groups]]
# name = "Auto"
# type = "url-test"
# rule = [".*"]
# url = "http://www.gstatic.com/generate_204"
# interval = 300
# tolerance = 150
# lazy = true

# [[custom_groups]]
# name = "Proxy"
# type = "select"
# rule = [".*", "[]DIRECT"]
# disable-udp = false

# [[custom_groups]]
# name = "LoadBalance"
# type = "load-balance"
# rule = [".*", "[]Proxy", "[]DIRECT"]
# interval = 100
# strategy = "consistent-hashing"
# url = "http://www.gstatic.com/generate_204"

[[custom_groups]]
import = "snippets/groups.toml"

[ruleset]
# 是否启用规则集下载与规则生成；关闭时不应依赖下方覆盖或按请求更新选项。
# Whether to enable ruleset retrieval and rule generation; when disabled, do not rely on the overwrite or per-request refresh options below.
enabled = true

# 是否用生成的规则覆盖基础模板已有规则；false 保留原规则并追加生成结果。
# Whether generated rules replace rules already present in the base template; false preserves the originals and appends generated output.
overwrite_original_rules = false

# 是否每次请求都更新规则集；false 使用启动/配置加载时取得的内容以及缓存策略。
# Whether to refresh rulesets on every request; false uses content obtained during startup/config loading together with cache policy.
update_ruleset_on_request = false

# 规则集数组字段：ruleset 为本地文件或 URL，group 为目标策略组，type 支持 surge-ruleset、quantumultx、clash-domain、clash-ipcidr、clash-classic，interval 为更新秒数。
# Ruleset-array fields: ruleset is a local file or URL, group is the target group, type accepts surge-ruleset, quantumultx, clash-domain, clash-ipcidr, or clash-classic, and interval is seconds.
# [[rulesets]]
# group = "Proxy"
# ruleset = "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/Unbreak.list"
# type = "surge-ruleset"
# interval = 86400

[[rulesets]]
import = "snippets/rulesets.toml"

[template]
# 模板 include 语句可访问的本地根目录；空值按本格式读取器的默认模板路径规则处理。
# Local root accessible to template include statements; an empty value follows this format loader's default template-path behavior.
template_path = ""

# 注入模板 global 作用域的键值；例如 clash.http_port 可在模板中以 global.clash.http_port 访问。TOML 此处的 value 必须为字符串。
# Key/value pairs injected into the template global scope; for example clash.http_port is available as global.clash.http_port. TOML value entries here must be strings.
[[template.globals]]
key = "clash.http_port"
value = "7890"

[[template.globals]]
key = "clash.socks_port"
value = "7891"

[[template.globals]]
key = "clash.allow_lan"
value = "true"

[[template.globals]]
key = "clash.log_level"
value = "info"

[[template.globals]]
key = "clash.external_controller"
value = "127.0.0.1:9090"

[[template.globals]]
key = "singbox.allow_lan"
value = "true"

[[template.globals]]
key = "singbox.mixed_port"
value = "2080"

# 接口别名数组：uri 为短路径，target 为实际路径与查询串；访问别名时附带的请求参数会继续传给目标。
# API-alias array: uri is the short path and target is the actual path/query; request arguments supplied to the alias are forwarded to the target.
[[aliases]]
uri = "/clash"
target = "/sub?target=clash"

[[aliases]]
uri = "/clashr"
target = "/sub?target=clashr"

[[aliases]]
uri = "/surge"
target = "/sub?target=surge"

[[aliases]]
uri = "/quan"
target = "/sub?target=quan"

[[aliases]]
uri = "/quanx"
target = "/sub?target=quanx"

[[aliases]]
uri = "/mellow"
target = "/sub?target=mellow"

[[aliases]]
uri = "/surfboard"
target = "/sub?target=surfboard"

[[aliases]]
uri = "/loon"
target = "/sub?target=loon"

[[aliases]]
uri = "/singbox"
target = "/sub?target=singbox"

[[aliases]]
uri = "/ss"
target = "/sub?target=ss"

[[aliases]]
uri = "/ssd"
target = "/sub?target=ssd"

[[aliases]]
uri = "/sssub"
target = "/sub?target=sssub"

[[aliases]]
uri = "/ssr"
target = "/sub?target=ssr"

[[aliases]]
uri = "/v2ray"
target = "/sub?target=v2ray"

[[aliases]]
uri = "/trojan"
target = "/sub?target=trojan"

[[aliases]]
uri = "/test"
target = "/render?path=templates/test.tpl"

# 定时 JavaScript 任务数组：name 为任务名，cronexp 使用 Quartz 风格 Cron，path 为脚本路径，timeout 为执行超时秒数；无表项时不运行任务。
# Scheduled JavaScript task array: name identifies the task, cronexp uses Quartz-style cron, path is the script path, and timeout is seconds; no entries means no tasks run.
#[[tasks]]
#name = "tick"
#cronexp = "0/10 * * * * ?"
#path = "tick.js"
#timeout = 3

[server]
# Web 服务监听地址；0.0.0.0 监听所有 IPv4 接口。若暴露公网，请配合 public/strict 安全档位和反向代理访问控制。
# Web-server bind address; 0.0.0.0 listens on all IPv4 interfaces. For Internet exposure, combine it with public/strict security and reverse-proxy access controls.
listen = "0.0.0.0"
# Web 服务监听端口；PORT 环境变量存在时优先于本值。
# Web-server port; the PORT environment variable overrides this value when set.
port = 25500
# 静态文件根目录并挂载到 /；设为空字符串可关闭静态文件服务。
# Static-file root mounted at /; set to an empty string to disable static serving.
serve_file_root = "web"

[advanced]
# 日志级别：info、warn、error、fatal、verbose 或 debug；未知值按 info 处理。
# Log level: info, warn, error, fatal, verbose, or debug; unknown values fall back to info.
log_level = "info"
# 是否强制输出详细调试信息；true 会覆盖 log_level 并使用 verbose 级别，可能包含敏感配置细节。
# Whether to force verbose diagnostics; true overrides log_level with verbose and may expose sensitive configuration details.
print_debug_info = false
# 监听套接字等待队列上限（libevent 后端）；不是同时处理请求数。
# Listening-socket backlog limit on the libevent backend; this is not the number of concurrently processed requests.
max_pending_connections = 10240
# HTTP 基础工作线程数；SUBCONVERTER_MAX_CONCURRENT_THREADS 可覆盖，最小会收敛为 1。
# Base HTTP worker-thread count; SUBCONVERTER_MAX_CONCURRENT_THREADS overrides it and values are clamped to at least 1.
max_concurrent_threads = 16
# cpp-httplib 后端在突发流量下的动态工作线程总上限；必须不小于基础线程数，否则会自动提高。SUBCONVERTER_MAX_SERVER_THREADS 可覆盖。
# Maximum total dynamic workers during bursts on the cpp-httplib backend; it is raised if below the base count. SUBCONVERTER_MAX_SERVER_THREADS overrides it.
max_server_threads = 128
# 单次配置允许的规则集数量上限；0 表示不限制。
# Maximum rulesets allowed in one configuration; 0 means unlimited.
max_allowed_rulesets = 64
# 转换时允许生成的规则数量上限；0 表示不限制。
# Maximum number of rules generated during conversion; 0 means unlimited.
max_allowed_rules = 0
# 单次远程下载允许的字节数上限；0 表示不限制。过大值会增加内存与带宽风险。
# Maximum bytes allowed for one remote download; 0 means unlimited. Large values increase memory and bandwidth exposure.
max_allowed_download_size = 0
# 是否启用订阅、配置和规则集的磁盘缓存；关闭后下列三个 TTL 都按 0 处理。
# Whether to enable on-disk caching for subscriptions, configs, and rulesets; when false, all three TTL values below are treated as 0.
enable_cache = true
# 订阅下载缓存有效期，单位秒；0 表示不缓存。
# Subscription-download cache lifetime in seconds; 0 disables this cache.
cache_subscription = 60
# 外部配置及通用配置资源缓存有效期，单位秒；0 表示不缓存。
# External/general configuration resource cache lifetime in seconds; 0 disables this cache.
cache_config = 300
# 规则集下载缓存有效期，单位秒；0 表示不缓存。
# Ruleset-download cache lifetime in seconds; 0 disables this cache.
cache_ruleset = 21600
# 每次执行后是否清理脚本上下文；更隔离但可能失去跨请求脚本状态。
# Whether to clean the script context after each execution; improves isolation but removes cross-request script state.
script_clean_context = true
# 是否并行抓取多个规则集；可降低生成延迟，但会增加瞬时连接与资源占用。
# Whether to fetch multiple rulesets concurrently; reduces generation latency at the cost of burst connections and resources.
async_fetch_ruleset = true
# 多订阅转换中某个链接失败时是否跳过并继续；false 会让失败影响整次转换。
# Whether to skip a failed link and continue a multi-subscription conversion; false lets a failed source fail the overall conversion.
skip_failed_links = true
# 是否合并内容相同的并发 GET /sub 请求，让它们共享一次转换结果；上传请求不会参与合并。SUBCONVERTER_DISABLE_COALESCING=true 可关闭。
# Whether identical concurrent GET /sub requests share one conversion result; upload requests are excluded. SUBCONVERTER_DISABLE_COALESCING=true disables it.
enable_request_coalescing = true
# 合并请求首次得到 5xx 时是否在服务端内部重试一次；SUBCONVERTER_COALESCE_RETRY_ON_5XX 可覆盖。
# Whether a coalesced request performs one internal retry after an initial 5xx; SUBCONVERTER_COALESCE_RETRY_ON_5XX overrides it.
coalesce_retry_on_5xx = true
# 默认验证远程 TLS 证书。仅在受控兼容场景临时设为 true；不要把它作为网络错误的常规修复手段。
# Remote TLS certificates are verified by default. Set true only as a temporary, controlled compatibility exception; do not use it as a routine response to network errors.
allow_insecure_tls = false
# 符合请求合并条件且未启用 Age 加密的 200 /sub 响应微缓存秒数；0 关闭，正值最大收敛为 5。SUBCONVERTER_RESPONSE_CACHE_TTL 可覆盖。
# Micro-cache seconds for eligible coalesced, non-Age-encrypted 200 /sub responses; 0 disables it and values are capped at 5. SUBCONVERTER_RESPONSE_CACHE_TTL overrides it.
response_cache_ttl = 0
