<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favicon proposal preview</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f7fa;
      color: #172033;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      display: grid;
      gap: 24px;
      padding: 32px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .sample {
      display: grid;
      place-items: center;
      width: 96px;
      height: 72px;
      border: 1px solid #d8dee8;
      border-radius: 8px;
      background: #fff;
    }
    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 260px;
      height: 40px;
      padding: 0 12px;
      border-radius: 8px 8px 0 0;
      background: #ffffff;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      font-size: 14px;
    }
    .label {
      min-width: 70px;
      color: #64748b;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <div class="row">
      <span class="label">16px</span>
      <div class="sample"><img src="favicon-proposal.svg" width="16" height="16" alt=""></div>
    </div>
    <div class="row">
      <span class="label">32px</span>
      <div class="sample"><img src="favicon-proposal.svg" width="32" height="32" alt=""></div>
    </div>
    <div class="row">
      <span class="label">64px</span>
      <div class="sample"><img src="favicon-proposal.svg" width="64" height="64" alt=""></div>
    </div>
    <div class="row">
      <span class="label">标签页</span>
      <div class="tab">
        <img src="favicon-proposal.svg" width="16" height="16" alt="">
        <span>SubConverter-Extended</span>
      </div>
    </div>
  </main>
</body>
</html>
