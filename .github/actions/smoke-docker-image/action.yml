name: Smoke test Docker image
description: Run a Docker image and verify that the SubConverter HTTP endpoint responds.

inputs:
  image:
    description: Image reference, preferably pinned by digest.
    required: true
  platform:
    description: Docker platform to run, such as linux/amd64 or linux/arm/v7.
    required: true
  custom-openclash-rules-revision:
    description: Custom_OpenClash_Rules revision expected in the image.
    required: true
  port:
    description: Container port exposed by SubConverter.
    required: false
    default: "25500"

runs:
  using: composite
  steps:
    - name: Run image and check /version
      shell: bash
      run: |
        set -euo pipefail

        IMAGE="${{ inputs.image }}"
        PLATFORM="${{ inputs.platform }}"
        CONTAINER_PORT="${{ inputs.port }}"
        RULES_REVISION="${{ inputs.custom-openclash-rules-revision }}"

        CID="$(docker run -d --platform "$PLATFORM" -e PORT="$CONTAINER_PORT" -p "127.0.0.1::${CONTAINER_PORT}" "$IMAGE")"
        trap 'docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT

        HOST_PORT="$(docker port "$CID" "${CONTAINER_PORT}/tcp" | awk -F: 'END {print $NF}')"
        URL="http://127.0.0.1:${HOST_PORT}/version"
        FIXTURE_BASE="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/tests/fixtures"

        docker exec "$CID" sh -c '
          test "${TZ:-}" = "Asia/Shanghai"
          test -e /usr/share/zoneinfo/Asia/Shanghai
          test "$(date +%z)" = "+0800"
          test -s /base/Custom_OpenClash_Rules/manifest.sha256
          test -s /base/Custom_OpenClash_Rules/main/rule/Custom_Direct.list
        '

        image_rules_revision="$(docker inspect --format '{{ index .Config.Labels "com.aethersailor.custom-openclash-rules.revision" }}' "$CID")"
        if [ "$image_rules_revision" != "$RULES_REVISION" ]; then
          echo "Image rules revision mismatch: expected $RULES_REVISION, got $image_rules_revision" >&2
          exit 1
        fi

        for _ in $(seq 1 30); do
          if curl -fsS "$URL" >/tmp/subconverter-smoke.out; then
            head -c 200 /tmp/subconverter-smoke.out
            python3 scripts/run-subconverter-smoke.py \
              --base-url "http://127.0.0.1:${HOST_PORT}" \
              --remote-subscription-url "${FIXTURE_BASE}/sample-subscription.txt" \
              --mihomo-yaml-subscription-url "${FIXTURE_BASE}/mihomo-provider-subscription.yml" \
              --legacy-subscription-url "${FIXTURE_BASE}/legacy-surge-subscription.conf" \
              --verify-non-clash
            curl -fsS "http://127.0.0.1:${HOST_PORT}/Custom_OpenClash_Rules/main/rule/Custom_Direct.list" > /tmp/bundled-custom-direct.list
            curl -fsS "https://raw.githubusercontent.com/Aethersailor/Custom_OpenClash_Rules/${RULES_REVISION}/rule/Custom_Direct.list" > /tmp/upstream-custom-direct.list
            cmp /tmp/bundled-custom-direct.list /tmp/upstream-custom-direct.list
            exit 0
          fi

          if ! docker ps --filter "id=$CID" --format '{{.ID}}' | grep -q .; then
            docker logs "$CID" || true
            exit 1
          fi

          sleep 2
        done

        docker logs "$CID" || true
        exit 1
