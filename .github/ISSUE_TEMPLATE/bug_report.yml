name: Bug 反馈
description: 功能运行不正常 / 失效
title: "[BUG] "
body:
  - type: markdown
    attributes:
      value: |
         遇到问题请先尝试使用最新版本镜像。
         如果是使用公共转换服务中遇到的问题，请先联系服务的提供者。
  - type: checkboxes
    id: version-check
    attributes:
      label: 确认版本最新
      description: 对于您遇到的 Bug，是否尝试在最新 Action 编译的版本中复现？
      options:
      - label: 我已经确认在最新 Action 编译的版本中复现
        required: true
  - type: checkboxes
    id: public-check
    attributes:
      label: 已尝试使用公共实例
      description: 对于您遇到的 Bug，是否尝试在本项目的公共实例(api.asailor.org)中复现？
      options:
      - label: 我已经确认在公共实例中复现
        required: true
  - type: checkboxes
    id: issue-check
    attributes:
      label: 检索issue
      description: 对于您遇到的 Bug，是否已经确认之前没有其他 Issue 涉及？
      options:
      - label: 我已经确认之前没有 Issue 涉及此 Bug
        required: true
  - type: input
    id: subconverter-version
    attributes:
      label: SubConverter-Extended 版本
      description: SubConverter-Extended 版本
      placeholder: 请输入详细的版本号
    validations:
      required: true
  - type: input
    id: convert
    attributes:
      label: 转换过程
      description: Bug 发生在什么配置转换为什么配置的过程中？
      placeholder: 请输入“xxx转换为xxx配置”
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: 转换设置
      description: 转换时使用的配置文件或外部配置链接
      placeholder: 请输入
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 复现步骤
      description: Bug 的详细复现步骤
      placeholder: 请输入
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      description: 您期望的结果是？
      placeholder: 请输入
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      description: 实际得到的结果是？
      placeholder: 请输入
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 错误信息
      description: SubConverter-Extended 转换时的日志/信息输出
      render: shell
      placeholder: 请输入
    validations:
      required: false